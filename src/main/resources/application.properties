# === Old Spring Boot 2 property names (migrate in Boot 3) ===
# spring.datasource.* → spring.sql.init.*
spring.datasource.schema=classpath:db/schema.sql
spring.datasource.data=classpath:db/data.sql
spring.datasource.initialization-mode=always

# management.contextPath → management.server.base-path
management.contextPath=/manage

# H2 for demo
spring.datasource.url=jdbc:h2:mem:demo;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Disable security for demo (or use WebSecurityConfigurerAdapter)
spring.security.user.name=user
spring.security.user.password=pass
